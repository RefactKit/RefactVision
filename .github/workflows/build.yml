name: CI — Quality Gate

# ─────────────────────────────────────────────
# Triggers: every push and PR targeting main/dev
# ─────────────────────────────────────────────
on:
  push:
    branches: [main, dev, dev-argane]
  pull_request:
    branches: [main, dev, dev-argane]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # pnpm cache key bump: change this to invalidate pnpm cache
  PNPM_CACHE_VERSION: v1
  NODE_VERSION: '22'

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Lint & Format (Biome)
# Fastest gate: catch style/lint violations before running any tests.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: 🧹 Lint & Format (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ env.PNPM_CACHE_VERSION }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-${{ env.PNPM_CACHE_VERSION }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Check formatting (fail if files need formatting)
      - name: Check format
        run: npx biome format .

      # Check linting (errors fail, warnings are shown)
      - name: Check lint
        run: npx biome check .

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Unit & Integration Tests (Vitest)
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: 🧪 Unit & Integration Tests (Vitest)
    runs-on: ubuntu-latest
    needs: lint

    # ⚠️  Vitest tests that hit server functions need DB/Auth env vars.
    # Store secrets in your repo Settings → Secrets and variables → Actions.
    # Tests that don't need a DB will still pass even without these.
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ env.PNPM_CACHE_VERSION }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-${{ env.PNPM_CACHE_VERSION }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Run tests
      - name: Run Vitest
        run: npx vitest run

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Build (TypeScript type-check + Vite build)
  # Ensures the codebase compiles and the SSR bundle is healthy.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build & Type-check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ env.PNPM_CACHE_VERSION }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-${{ env.PNPM_CACHE_VERSION }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # TypeScript strict check using the sonar tsconfig (no external deps)
      - name: TypeScript type-check
        run: npx tsc --project tsconfig.sonar.json --noEmit

      # Full SSR build — verifies the bundle is healthy end-to-end
      - name: Build (Vite / Nitro)
        run: NITRO_PRESET=vercel npx vite build

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4 — E2E Tests (Playwright)
  # Starts the built server and runs browser tests against it.
  # Needs: build success + a running server process.
  # ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: 🎭 E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [unit-tests, build]
    # E2E needs runtime secrets for auth/db
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      CI: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ env.PNPM_CACHE_VERSION }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-${{ env.PNPM_CACHE_VERSION }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Run E2E — Playwright will start the dev server via webServer config
      - name: Run Playwright E2E tests
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
