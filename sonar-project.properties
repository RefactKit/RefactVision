
# displayed in the SonarCloud UI.
sonar.projectName=RefactVision
sonar.projectVersion=1.0
sonar.projectKey=RefactKit_RefactVision
sonar.organization=refactkit
sonar.sources=src
sonar.exclusions=node_modules/**,.nitro/**,.output/**,dist/**,**/*.test.ts,**/*.spec.ts,**/*.test.tsx,**/*.spec.tsx,src/routeTree.gen.ts
sonar.tests=src,e2e
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/*.test.tsx,**/*.spec.tsx,e2e/**
sonar.typescript.tsconfigPaths=tsconfig.sonar.json
sonar.sourceEncoding=UTF-8
sonar.javascript.lcov.reportPaths=coverage/lcov.info